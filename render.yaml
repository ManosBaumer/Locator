# Deploy: Render Dashboard → New → Blueprint → connect ManosBaumer/Locator
services:
  - type: web
    name: locater-api
    runtime: docker
    repo: https://github.com/ManosBaumer/Locator
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: AMAP_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://locater-map.netlify.app
      - key: LOG_LEVEL
        value: INFO
